{% extends "layout.html" %}
{% block body %}
<div class="mx-auto max-w-xl">
    <div class="text-center">
        <h1 class="text-2xl font-bold text-slate-900">Reset password</h1>
    </div>
    <hr class="my-4 border-slate-200" />
    {% if expired %}
        <p class="rounded-md border border-amber-200 bg-amber-50 p-3 text-sm text-amber-700">This link has expired. Use the Reset password link in the top navigation to request another reset.</p>
    {% else %}
        <form action="/reset/{{ username }}/{{ confirmation }}" method="POST" class="grid gap-4">
            <label for="password" class="grid gap-1 text-sm text-slate-700">
                New Password
                <input type="password" id="password" placeholder="Password" name="password" class="rounded-md border border-slate-300 px-3 py-2 text-slate-800 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200">
            </label>
            <label for="password2" class="grid gap-1 text-sm text-slate-700">
                New Password (again)
                <input type="password" id="password2" placeholder="...again" name="password2" class="rounded-md border border-slate-300 px-3 py-2 text-slate-800 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200">
            </label>
            <input type="submit" value="Submit" class="rounded-md bg-brand-500 px-4 py-2 font-semibold text-white hover:bg-brand-600">
        </form>
        {% if errors %}
            <p class="mt-3 text-sm text-red-600">{{ errors }}</p>
        {% endif %}
    {% endif %}
</div>
{% endblock %}
