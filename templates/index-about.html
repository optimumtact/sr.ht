{#
    Shown on the home page for visitors who are not logged in
#}

<div class="text-center">
    <h1 class="text-3xl font-bold tracking-tight text-slate-900">{{ domain }}</h1>
    <p class="mt-2 text-slate-600">
        {{ domain }} is a private file hosting website.
    </p>
    <p class="mt-1 text-slate-600">
        Accounts are given with approval from {{ owner }} &lt;<a href="mailto:{{ owner_email }}">{{ owner_email }}</a>&gt;.
    </p>
    <a href="/login" class="mt-3 inline-flex rounded-md bg-brand-500 px-4 py-2 font-semibold text-white hover:bg-brand-600">Log In</a>
</div>
