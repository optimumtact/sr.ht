{% extends "layout.html" %}
{% block body %}
<div class="mx-auto max-w-md">
    <h1 class="text-center text-2xl font-bold text-slate-900">Log In</h1>

    {% if errors %}
        <div class="mt-4 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ errors }}</div>
    {% endif %}
    {% if reset %}
        <div class="mt-4 rounded-md border border-sky-200 bg-sky-50 px-3 py-2 text-sm text-sky-700">Your password has been reset. You may now login.</div>
    {% endif %}

    <form action="/login" method="POST" class="mt-4 grid gap-4">
        <label class="grid gap-1 text-sm text-slate-700">
            Username
            <input id="username" name="username" value="{% if username %}{{ username }}{% endif %}" class="rounded-md border border-slate-300 px-3 py-2 text-slate-800 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200" />
        </label>
        <label class="grid gap-1 text-sm text-slate-700">
            Password
            <input id="password" name="password" type="password" class="rounded-md border border-slate-300 px-3 py-2 text-slate-800 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200" />
        </label>
        <div class="flex items-center justify-end gap-3">
            <label class="inline-flex items-center gap-2 text-sm text-slate-700">
                <input type="checkbox" name="remember-me" class="h-4 w-4 rounded border-slate-300 text-brand-500 focus:ring-brand-200" />
                Remember me
            </label>
        </div>
        <input type="submit" class="rounded-md bg-brand-500 px-4 py-2 font-semibold text-white hover:bg-brand-600" value="Log In" />
    </form>
</div>
{% endblock %}
